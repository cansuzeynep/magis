name: Rental Monitor

on:
  schedule:
    # Runs every 5 minutes to ensure the monitor is alive
    # The script itself loops every 2 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear the seen listings cache'
        required: false
        type: boolean
        default: false

# This ensures that if a new run starts, it cancels the previous one
# This prevents duplicate notifications and keeps only one monitor active
concurrency:
  group: rental-monitor
  cancel-in-progress: true

jobs:
  check-rentals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Cache seen listings
        uses: actions/cache@v4
        with:
          path: seen_listings.json
          key: seen-listings-${{ github.run_id }}
          restore-keys: |
            seen-listings-
      
      - name: Run rental monitor
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          CLEAR_CACHE: ${{ github.event.inputs.clear_cache }}
        run: python rental_monitor.py
